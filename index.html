<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="assests/css/style.css">
</head>
<body>
    
    <section class="registerSection">
        <div class="title">
            <h1>sign up</h1>
            <h5>Let's Create Your <span>Account</span></h5>
        </div>

        <form class="formSection" action="">
            <div class="halfInput">
                <label>First Name</label><br>
                <input placeholder="please Enter your FirstName" type="text" required>
            </div>

            <div class="halfInput">
                <label>Last Name</label><br>
                <input placeholder="please Enter your LastName" type="text" required>
            </div>

            <div class="radioSection">
                <label>Gender</label><br>
                <div class="radiobox">
                    <div class="checkboxsection">
                    <label>female</label>
                    <input class="checkbox" type="radio" name="Gender">
                    <label>male</label>
                    <input class="checkbox" type="radio" name="Gender">
            
                    </div>
                </div>


            </div>




             <div class="lineInput">
                <label>Email</label><br>
                <input placeholder="please Enter your Email" type="email" required>
            </div>

            <div class="lineInput">
                <label>Retype Email</label><br>
                <input placeholder="please Enter your Email" type="email" required>
            </div>

            <div class="lineInput">
                <label>Password</label><br>
                <input placeholder="please Enter your Password" type="password" required>
            </div>

            <div class="lineInput">
                <label>Retype Password</label><br>
                <input placeholder="please Enter your Password" type="password" required>
            </div>
             <div class="checkboxsection">
                <input class="checkbox" type="checkbox" required>
                <label>I Agree To The Terms & Condition</label>
            </div>

            <div>
                <button type="submit">Sign Up</button>
            </div>
        </form>
    </section>

</body>
</html>
